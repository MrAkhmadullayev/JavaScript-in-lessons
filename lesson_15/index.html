<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Login</title>
	<link rel="stylesheet" href="./style.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
		integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
		crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
	<div class="container">
		<div class="left">
			<h1>Hello Dear's</h1>
			<p>You have more option if you are a new user<br>Please Sign Up to Access</p>
			<a href="./signup.html" class="btn_outline">SIGN UP</a>
		</div>
		<div class="right">
			<h1>Log In</h1>
			<div class="icons">
				<a href="#" class="social-icon"><i class="fa-brands fa-google"></i></a>
				<a href="#" class="social-icon"><i class="fa-brands fa-facebook-f"></i></a>
				<a href="#" class="social-icon"><i class="fa-brands fa-github"></i></a>
				<a href="#" class="social-icon"><i class="fa-brands fa-linkedin-in"></i></a>
			</div>
			<p class="subtitle">Or use your email Password</p>
			<form action="">
				<input type="email" placeholder="Email" required>
				<input type="password" placeholder="Password" required>
				<a href="#" class="forgot">Forgot your Password?</a>
				<button type="submit" class="btn">LOG IN</button>
			</form>
		</div>
	</div>
</body>

</html>
