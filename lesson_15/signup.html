<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Sign Up</title>
	<link rel="stylesheet" href="./style.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
		integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
		crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
	<div class="container">
		<div class="left">
			<h1>Welcome Back!</h1>
			<p>Enter your personal details to use all<br>of site features</p>
			<a href="./index.html" class="btn_outline">SIGN IN</a>
		</div>
		<div class="right">
			<h1>Create Account</h1>
			<div class="icons">
				<a href="#" class="social-icon"><i class="fa-brands fa-google"></i></a>
				<a href="#" class="social-icon"><i class="fa-brands fa-facebook-f"></i></a>
				<a href="#" class="social-icon"><i class="fa-brands fa-github"></i></a>
				<a href="#" class="social-icon"><i class="fa-brands fa-linkedin-in"></i></a>
			</div>
			<p class="subtitle">or use your email for registration</p>
			<form action="">
				<input type="text" placeholder="Name" required>
				<input type="email" placeholder="Email" required>
				<input type="password" placeholder="Password" required>
				<button type="submit" class="btn" style="margin-top: 15px;">SIGN UP</button>
			</form>
		</div>
	</div>
</body>

</html>
